services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: vzaimno
      POSTGRES_USER: vzaimno
      POSTGRES_PASSWORD: vzaimno_dev_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vzaimno -d vzaimno"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  uploads-init:
    image: redis:7.2-alpine
    user: "0:0"
    entrypoint: ["sh", "-c"]
    command: ["mkdir -p /app/uploads && chown -R 10001:10001 /app/uploads"]
    restart: "no"
    volumes:
      - uploads_data:/app/uploads

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENV: dev
      DATABASE_URL: postgresql://vzaimno:vzaimno_dev_password@postgres:5432/vzaimno
      REDIS_URL: redis://redis:6379/0
      UPLOADS_DIR: /app/uploads
      RUN_MIGRATIONS: "1"
      ALLOW_RUNTIME_SCHEMA_BOOTSTRAP: "0"
      TRUSTED_HOSTS: localhost,127.0.0.1,::1,10.0.2.2,10.0.3.2,host.docker.internal,172.22.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      ENABLE_PROXY_HEADERS: "0"
    command: ["uvicorn", "app.runtime:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      uploads-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - uploads_data:/app/uploads

  admin:
    build:
      context: .
      dockerfile: services/admin_panel/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENV: dev
      DATABASE_URL: postgresql://vzaimno:vzaimno_dev_password@postgres:5432/vzaimno
      REDIS_URL: redis://redis:6379/0
      UPLOADS_DIR: /app/uploads
      RUN_MIGRATIONS: "0"
      ALLOW_RUNTIME_SCHEMA_BOOTSTRAP: "0"
      TRUSTED_HOSTS: localhost,127.0.0.1,::1,10.0.2.2,10.0.3.2,host.docker.internal,172.22.0.1
      ADMIN_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      ENABLE_PROXY_HEADERS: "0"
      ADMIN_SESSION_COOKIE_SECURE: "0"
    command: ["uvicorn", "services.admin_panel.app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    depends_on:
      uploads-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/readyz', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    ports:
      - "8001:8001"
    volumes:
      - ./:/app
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
