services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      ENV: prod
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      UPLOADS_DIR: /app/uploads
      RUN_MIGRATIONS: "1"
      ALLOW_RUNTIME_SCHEMA_BOOTSTRAP: "0"
      ENABLE_PROXY_HEADERS: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/readyz"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads_data:/app/uploads

  admin:
    build:
      context: .
      dockerfile: services/admin_panel/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      ENV: prod
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      UPLOADS_DIR: /app/uploads
      RUN_MIGRATIONS: "0"
      ALLOW_RUNTIME_SCHEMA_BOOTSTRAP: "0"
      ENABLE_PROXY_HEADERS: "1"
      ADMIN_SESSION_COOKIE_SECURE: "1"
      ADMIN_SESSION_COOKIE_SAMESITE: lax
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/readyz"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  redis_data:
  uploads_data:
