<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vzaimno | Админ-панель</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <p class="eyebrow">Панель управления</p>
        <h1>Vzaimno</h1>
      <p class="muted">Сотрудник: {{ staff_user.email }} · {{ labels.roles.get(staff_user.role, staff_user.role) }}</p>
      </div>
      <nav class="nav" aria-label="Навигация">
        <a href="/admin/users" class="{% if request.url.path.startswith('/admin/users') %}active{% endif %}">Пользователи</a>
        <a href="/admin/announcements" class="{% if request.url.path.startswith('/admin/announcements') %}active{% endif %}">Модерация</a>
        <a href="/admin/reports" class="{% if request.url.path.startswith('/admin/reports') %}active{% endif %}">Жалобы</a>
        <a href="/admin/support" class="{% if request.url.path.startswith('/admin/support') %}active{% endif %}">Поддержка</a>
        <a href="/admin/restrictions" class="{% if request.url.path.startswith('/admin/restrictions') %}active{% endif %}">Ограничения</a>
        <a href="/admin/audit" class="{% if request.url.path.startswith('/admin/audit') %}active{% endif %}">Аудит</a>
        <a href="/admin/logout" class="nav-logout">Выйти</a>
      </nav>
    </header>
    <main class="page">
    {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
